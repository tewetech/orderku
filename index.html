<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order-Ku | Tewe Tech</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/tewetech/favicon/refs/heads/main/tewe.png">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(180deg, #ffffff 0%, #29b6d3 100%);
    background-attachment: fixed;
}
::-webkit-scrollbar {
    width: 4px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: rgba(21, 94, 117, 0.2);
    border-radius: 10px;
}
@keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}
.shimmer-box {
    position: relative;
    overflow: hidden;
}
.shimmer-box::before {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
    animation: shimmer 3s infinite;
    pointer-events: none;
    z-index: 10;
}
.glass-panel {
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.7);
}
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
input[type=number] {
    -moz-appearance: textfield;
}
.loader {
    width: 40px;
    padding: 6px;
    aspect-ratio: 1;
    border-radius: 50%;
    background: #155e75;
    --_m: conic-gradient(#0000 10%,#000), linear-gradient(#000 0 0) content-box;
    -webkit-mask: var(--_m);
    mask: var(--_m);
    -webkit-mask-composite: source-out;
    mask-composite: subtract;
    animation: l3 1s infinite linear;
    margin: 0 auto;
}
.loader-btn {
    width: 16px;
    padding: 2px;
    aspect-ratio: 1;
    border-radius: 50%;
    background: #ffffff;
    --_m: conic-gradient(#0000 10%,#000), linear-gradient(#000 0 0) content-box;
    -webkit-mask: var(--_m);
    mask: var(--_m);
    -webkit-mask-composite: source-out;
    mask-composite: subtract;
    animation: l3 1s infinite linear;
    margin: 0 auto;
}
@keyframes l3 {to{transform: rotate(1turn)}}
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-[360px] bg-[#f4fbff] rounded-[45px] border-[12px] border-[#155e75] shadow-2xl relative overflow-hidden flex flex-col pb-8">
        
        <div class="absolute -top-10 -right-10 w-64 h-64 bg-gradient-to-br from-[#38bdf8] to-[#0369a1] rounded-full blur-3xl opacity-30"></div>
        <div class="absolute top-40 -left-20 w-72 h-72 bg-[#7dd3fc] rounded-full blur-3xl opacity-40"></div>
        <div class="absolute -bottom-20 right-0 w-80 h-80 bg-[#bae6fd] rounded-full blur-3xl opacity-50"></div>

        <div class="absolute top-0 inset-x-0 h-6 flex justify-center mt-2 z-20">
            <div class="w-24 h-5 bg-[#155e75] rounded-b-xl"></div>
        </div>

        <div class="relative z-10 flex-1 flex flex-col p-6 pt-12 overflow-hidden">
            <h1 class="text-[#155e75] text-lg font-semibold text-center mb-6 tracking-wide shrink-0">Catatan Order</h1>

            <form id="formPembelian" novalidate class="flex flex-col gap-4 shrink-0">
                
                <div class="flex flex-col gap-1.5 relative">
                    <label for="tanggal_real" class="text-[11px] font-medium px-2 text-[#155e75]/80">Tanggal :</label>
                    <div class="relative w-full h-11">
                        <input type="date" id="tanggal_real" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <input type="text" id="tanggal_display" placeholder="" readonly class="w-full h-11 block glass-panel px-5 pt-[2px] rounded-2xl text-[#155e75] focus:outline-none focus:ring-2 focus:ring-[#38bdf8]/50 transition-all text-[11px] font-medium shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)] relative z-0 pointer-events-none">
                    </div>
                </div>

                <div class="flex flex-col gap-1.5 relative">
                    <label for="nama" class="text-[11px] font-medium px-2 text-[#155e75]/80">Nama Barang :</label>
                    <input type="text" id="nama" placeholder="" autocomplete="off" class="w-full h-11 block glass-panel px-5 rounded-2xl text-[#155e75] focus:outline-none focus:ring-2 focus:ring-[#38bdf8]/50 transition-all text-xs shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)]">
                </div>

                <div class="flex flex-col gap-1.5 relative">
                    <label for="jumlah" class="text-[11px] font-medium px-2 text-[#155e75]/80">Jumlah :</label>
                    <input type="number" id="jumlah" min="1" placeholder="" class="w-full h-11 block glass-panel px-5 rounded-2xl text-[#155e75] focus:outline-none focus:ring-2 focus:ring-[#38bdf8]/50 transition-all text-xs shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)]">
                </div>

                <div class="flex flex-col gap-2 mt-2">
                    <button type="submit" id="btnSubmit" class="w-full h-[40px] shimmer-box px-6 rounded-2xl bg-[#155e75] text-white font-medium hover:bg-[#0e7490] hover:scale-[1.01] transition-all duration-300 text-xs tracking-wide shadow-lg shadow-[#155e75]/20 flex items-center justify-center">
                        Simpan
                    </button>
                    <button type="button" id="btnBukaOrderList" class="w-full h-[40px] px-6 rounded-2xl bg-white/70 text-[#155e75] font-medium hover:bg-white border border-white transition-all duration-300 text-xs tracking-wide shadow-sm flex items-center justify-center">
                        Lihat Daftar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="orderListPopup" class="fixed inset-0 z-[140] hidden items-center justify-center bg-[#155e75]/40 backdrop-blur-sm transition-opacity p-4">
        <div class="bg-[#f4fbff] border border-white/60 p-5 rounded-3xl shadow-2xl w-full max-w-[360px] max-h-[85vh] flex flex-col transform scale-100 transition-transform relative overflow-hidden">
            
            <div class="absolute -top-10 -right-10 w-64 h-64 bg-gradient-to-br from-[#38bdf8] to-[#0369a1] rounded-full blur-3xl opacity-30 pointer-events-none"></div>
            <div class="absolute top-40 -left-20 w-72 h-72 bg-[#7dd3fc] rounded-full blur-3xl opacity-40 pointer-events-none"></div>
            <div class="absolute -bottom-20 right-0 w-80 h-80 bg-[#bae6fd] rounded-full blur-3xl opacity-50 pointer-events-none"></div>

            <div class="relative z-10 flex flex-col h-full w-full max-h-full">
                <div class="flex justify-between items-center mb-4 shrink-0">
                    <h2 class="text-[12px] uppercase tracking-widest text-[#155e75] font-bold">Daftar Order :</h2>
                    <button type="button" id="btnTutupOrderList" class="text-[#155e75]/60 hover:text-rose-500 bg-white/60 p-1.5 rounded-xl transition-all shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <button type="button" id="btnHapusSemua" class="mb-4 shrink-0 text-[11px] font-medium text-rose-500 hover:text-rose-600 bg-rose-50/60 hover:bg-rose-100/60 border border-rose-200/50 py-2 px-3 rounded-xl transition-all shadow-sm flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Hapus Semua
                </button>

                <div id="daftarCatatan" class="flex flex-col gap-2 overflow-y-auto flex-1 pr-1 pb-2 min-h-[200px]">
                </div>
            </div>
        </div>
    </div>

    <div id="customConfirm" class="fixed inset-0 z-[150] hidden items-center justify-center bg-[#155e75]/60 backdrop-blur-md transition-opacity">
        <div class="bg-[#f4fbff] border border-white/60 p-5 rounded-3xl shadow-2xl w-[85%] max-w-[300px] text-center flex flex-col items-center transform scale-100 transition-transform">
            <div class="w-12 h-12 bg-rose-100/80 rounded-full flex items-center justify-center mb-3">
                <svg class="w-6 h-6 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </div>
            <h3 class="text-[#155e75] font-semibold text-sm mb-1">Hapus Semua Order?</h3>
            <p class="text-[#155e75]/60 text-[11px] mb-5">Tindakan ini tidak dapat dibatalkan.</p>
            <div class="flex gap-3 w-full">
                <button id="btnBatal" class="flex-1 h-[34px] px-4 rounded-xl bg-white/60 text-[#155e75] font-medium text-xs hover:bg-white transition-colors border border-white/50 shadow-sm flex items-center justify-center">Batal</button>
                <button id="btnKonfirmHapus" class="flex-1 h-[34px] px-4 rounded-xl bg-rose-400 text-white font-medium text-xs hover:bg-rose-500 transition-colors shadow-md shadow-rose-400/30 flex items-center justify-center">Hapus</button>
            </div>
        </div>
    </div>

    <div id="singleConfirm" class="fixed inset-0 z-[150] hidden items-center justify-center bg-[#155e75]/60 backdrop-blur-md transition-opacity">
        <div class="bg-[#f4fbff] border border-white/60 p-5 rounded-3xl shadow-2xl w-[85%] max-w-[300px] text-center flex flex-col items-center transform scale-100 transition-transform">
            <div class="w-12 h-12 bg-rose-100/80 rounded-full flex items-center justify-center mb-3">
                <svg class="w-6 h-6 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </div>
            <h3 class="text-[#155e75] font-semibold text-sm mb-1">Hapus Order Ini?</h3>
            <p class="text-[#155e75]/60 text-[11px] mb-5">Tindakan ini tidak dapat dibatalkan.</p>
            <div class="flex gap-3 w-full">
                <button id="btnBatalSingle" class="flex-1 h-[34px] px-4 rounded-xl bg-white/60 text-[#155e75] font-medium text-xs hover:bg-white transition-colors border border-white/50 shadow-sm flex items-center justify-center">Batal</button>
                <button id="btnKonfirmHapusSingle" class="flex-1 h-[34px] px-4 rounded-xl bg-rose-400 text-white font-medium text-xs hover:bg-rose-500 transition-colors shadow-md shadow-rose-400/30 flex items-center justify-center">Hapus</button>
            </div>
        </div>
    </div>

    <div id="tooltip" class="fixed hidden bg-[#155e75] text-white text-[10px] px-2.5 py-1 rounded-md z-[200] shadow-lg pointer-events-none transition-opacity duration-200">
        Harap isi bidang ini
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbzBnew0hWCsZhRKML7cdCKyqqZbf9ibuj9MqFXn5rJNMFYJrLfgj09uv63IfvPdpRtR/exec";

        const form = document.getElementById('formPembelian');
        const daftarCatatan = document.getElementById('daftarCatatan');
        const btnHapusSemua = document.getElementById('btnHapusSemua');
        const tooltip = document.getElementById('tooltip');
        const tanggalReal = document.getElementById('tanggal_real');
        const tanggalDisplay = document.getElementById('tanggal_display');
        const orderListPopup = document.getElementById('orderListPopup');
        const btnBukaOrderList = document.getElementById('btnBukaOrderList');
        const btnTutupOrderList = document.getElementById('btnTutupOrderList');
        const customConfirm = document.getElementById('customConfirm');
        const btnBatal = document.getElementById('btnBatal');
        const btnKonfirmHapus = document.getElementById('btnKonfirmHapus');
        const singleConfirm = document.getElementById('singleConfirm');
        const btnBatalSingle = document.getElementById('btnBatalSingle');
        const btnKonfirmHapusSingle = document.getElementById('btnKonfirmHapusSingle');
        const btnSubmit = document.getElementById('btnSubmit');

        let itemToDelete = null;

        async function fetchOrders() {
            daftarCatatan.innerHTML = '<div class="flex justify-center py-4"><div class="loader"></div></div>';
            try {
                const response = await fetch(gasUrl);
                const data = await response.json();
                daftarCatatan.innerHTML = '';
                
                if(data.length === 0) {
                    daftarCatatan.innerHTML = '<div class="text-center text-[#155e75]/60 font-medium text-[11px] py-4">Belum ada order</div>';
                } else {
                    data.forEach(item => {
                        renderCard(item.id, item.tanggal, item.nama, item.jumlah);
                    });
                }
            } catch (error) {
                daftarCatatan.innerHTML = '<div class="text-center text-rose-500 font-medium text-[11px] py-4">Gagal memuat data</div>';
            }
        }

        tanggalReal.addEventListener('change', function() {
            if(this.value) {
                const dateObj = new Date(this.value);
                const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
                tanggalDisplay.value = dateObj.toLocaleDateString('id-ID', options);
            } else {
                tanggalDisplay.value = '';
            }
        });

        btnBukaOrderList.addEventListener('click', () => {
            orderListPopup.classList.remove('hidden');
            orderListPopup.classList.add('flex');
            fetchOrders();
        });

        btnTutupOrderList.addEventListener('click', () => {
            orderListPopup.classList.add('hidden');
            orderListPopup.classList.remove('flex');
        });

        function showTooltip(el) {
            const rect = el.getBoundingClientRect();
            tooltip.style.top = (rect.top - 28) + 'px';
            tooltip.style.left = rect.left + 'px';
            tooltip.classList.remove('hidden');
            setTimeout(() => {
                tooltip.classList.add('hidden');
            }, 2000);
        }

        function renderCard(id, tanggal, nama, jumlah) {
            const dateObj = new Date(tanggal);
            const options = { day: 'numeric', month: 'short', year: 'numeric' };
            const formattedDate = dateObj.toLocaleDateString('id-ID', options);

            const card = document.createElement('div');
            card.className = 'glass-panel px-3 py-2 rounded-[14px] flex justify-between items-center hover:bg-white/60 transition-colors duration-300 shadow-sm shimmer-box shrink-0';
            card.setAttribute('data-id', id);

            const leftDiv = document.createElement('div');
            leftDiv.className = 'flex flex-col z-20';

            const namaSpan = document.createElement('span');
            namaSpan.className = 'font-semibold text-[12px] text-[#155e75] capitalize';
            namaSpan.textContent = nama;

            const tanggalSpan = document.createElement('span');
            tanggalSpan.className = 'text-[8px] text-[#155e75]/60 mt-0.5 uppercase tracking-wider font-medium';
            tanggalSpan.textContent = formattedDate;

            leftDiv.appendChild(namaSpan);
            leftDiv.appendChild(tanggalSpan);

            const rightContainer = document.createElement('div');
            rightContainer.className = 'flex items-center gap-2 z-20 shrink-0';

            const rightDiv = document.createElement('div');
            rightDiv.className = 'bg-gradient-to-br from-[#38bdf8] to-[#0369a1] px-2 py-0.5 rounded-lg text-[9px] font-semibold shadow-sm text-white';
            rightDiv.textContent = jumlah + ' PCS';

            const btnDelete = document.createElement('button');
            btnDelete.type = 'button';
            btnDelete.className = 'text-rose-400 hover:text-rose-600 bg-white/60 p-1 rounded-md transition-colors shadow-sm';
            btnDelete.innerHTML = '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>';
            
            btnDelete.addEventListener('click', function() {
                itemToDelete = card;
                singleConfirm.classList.remove('hidden');
                singleConfirm.classList.add('flex');
            });

            rightContainer.appendChild(rightDiv);
            rightContainer.appendChild(btnDelete);
            card.appendChild(leftDiv);
            card.appendChild(rightContainer);
            daftarCatatan.prepend(card);
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const namaInput = document.getElementById('nama');
            const jumlahInput = document.getElementById('jumlah');

            if (!tanggalReal.value) {
                showTooltip(tanggalDisplay);
                tanggalReal.focus();
                return;
            }
            if (!namaInput.value) {
                showTooltip(namaInput);
                namaInput.focus();
                return;
            }
            if (!jumlahInput.value) {
                showTooltip(jumlahInput);
                jumlahInput.focus();
                return;
            }

            const tanggal = tanggalReal.value;
            const nama = namaInput.value;
            const jumlah = jumlahInput.value;
            
            btnSubmit.innerHTML = '<div class="loader-btn"></div>';

            fetch(gasUrl, {
                method: 'POST',
                body: JSON.stringify({ action: 'create', tanggal: tanggal, nama: nama, jumlah: jumlah }),
                headers: { 'Content-Type': 'text/plain' }
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    if (daftarCatatan.innerHTML.includes('Belum ada order')) {
                        daftarCatatan.innerHTML = '';
                    }
                    renderCard(data.id, tanggal, nama, jumlah);
                    form.reset();
                    tanggalDisplay.value = '';
                }
                btnSubmit.innerHTML = 'Simpan';
            })
            .catch(err => {
                btnSubmit.innerHTML = 'Simpan';
            });
        });

        btnHapusSemua.addEventListener('click', function() {
            if (daftarCatatan.children.length > 0 && !daftarCatatan.innerHTML.includes('Belum ada order')) {
                customConfirm.classList.remove('hidden');
                customConfirm.classList.add('flex');
            }
        });

        btnBatal.addEventListener('click', function() {
            customConfirm.classList.add('hidden');
            customConfirm.classList.remove('flex');
        });

        btnKonfirmHapus.addEventListener('click', function() {
            btnKonfirmHapus.innerHTML = '<div class="loader-btn"></div>';
            fetch(gasUrl, {
                method: 'POST',
                body: JSON.stringify({ action: 'deleteAll' }),
                headers: { 'Content-Type': 'text/plain' }
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    daftarCatatan.innerHTML = '<div class="text-center text-[#155e75]/60 font-medium text-[11px] py-4">Belum ada order</div>';
                    customConfirm.classList.add('hidden');
                    customConfirm.classList.remove('flex');
                    orderListPopup.classList.add('hidden');
                    orderListPopup.classList.remove('flex');
                }
                btnKonfirmHapus.innerHTML = 'Hapus';
            });
        });

        btnBatalSingle.addEventListener('click', function() {
            itemToDelete = null;
            singleConfirm.classList.add('hidden');
            singleConfirm.classList.remove('flex');
        });

        btnKonfirmHapusSingle.addEventListener('click', function() {
            if (itemToDelete) {
                const id = itemToDelete.getAttribute('data-id');
                btnKonfirmHapusSingle.innerHTML = '<div class="loader-btn"></div>';
                fetch(gasUrl, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'delete', id: id }),
                    headers: { 'Content-Type': 'text/plain' }
                })
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success') {
                        itemToDelete.remove();
                        itemToDelete = null;
                        singleConfirm.classList.add('hidden');
                        singleConfirm.classList.remove('flex');
                        
                        if (daftarCatatan.children.length === 0) {
                             daftarCatatan.innerHTML = '<div class="text-center text-[#155e75]/60 font-medium text-[11px] py-4">Belum ada order</div>';
                        }
                    }
                    btnKonfirmHapusSingle.innerHTML = 'Hapus';
                });
            }
        });
    </script>
</body>
</html>
